<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberStegLab — Profile</title>
  <link rel="icon" type="image/png" href="../img/user.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="nav"></div>

<div class="page">

  <div class="page-header">
    <h2>PROFILE</h2>
    <p>შენი პროგრესი</p>
  </div>

  <!-- მომხმარებლის ინფო -->
  <div class="profile-header card mb-24">
    <div class="profile-avatar">
      <span id="profile-initial">?</span>
    </div>
    <div>
      <h2 id="profile-username" class="text-green">...</h2>
      <p id="profile-email" class="text-muted" style="font-size:12px; margin-top:4px;"></p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row mb-24">
    <div class="stat-card">
      <div class="stat-num text-green" id="stat-xp">0</div>
      <div class="stat-label">TOTAL XP</div>
    </div>
    <div class="stat-card">
      <div class="stat-num text-cyan" id="stat-solved">0</div>
      <div class="stat-label">SOLVED</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-achievements">0</div>
      <div class="stat-label">ACHIEVEMENTS</div>
    </div>
  </div>

  <div class="grid-2">

    <!-- გადაჭრილი challenges -->
    <div>
      <p class="section-title">SOLVED CHALLENGES</p>
      <div id="solved-list"></div>
    </div>

    <!-- achievements -->
    <div>
      <p class="section-title">ACHIEVEMENTS</p>
      <div id="achievements-list"></div>
    </div>

  </div>

</div>

<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
