<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberStegLab — Register</title>
  <link rel="icon" type="image/png" href="../img/login.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="center">
  <div class="auth-card">

    <div class="auth-header">
      <h1>
        CYBER<span class="text-cyan">STEG</span>LAB
      </h1>

      <p class="text-muted auth-subtitle">
      </p>
    </div>

    <input type="text" id="username" placeholder="username">
    <input type="email" id="email" placeholder="email">
    <input type="password" id="password" placeholder="password">

    <button class="btn btn-primary" onclick="register()">
      CREATE ACCOUNT
    </button>

    <div id="result" class="result"></div>

    <p class="auth-footer">
      უკვე გაქვს ანგარიში?
      <a href="login.html">შესვლა</a>
    </p>

  </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
